name: Build and push image

# Triggered by pushing a tag matching v*-aura.* (e.g., v0.8.5-aura.1).
# Builds the LibreChat image from the fork's source (Patch 1 + Patch 2
# applied as commits) and publishes to ghcr.io/auraworx/librechat:<tag>.
# `npm run build:data-provider` is chained inside the upstream Dockerfile,
# so the dist/ bundle is rebuilt from our patched source on every build.

on:
  push:
    tags:
      - 'v*-aura.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image owner
        id: img
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build & push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64    # match Fargate default for librechat-suite
          push: true
          tags: |
            ghcr.io/${{ steps.img.outputs.owner }}/librechat:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
