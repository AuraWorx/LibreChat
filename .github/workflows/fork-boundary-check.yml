name: Fork Boundary Check

# Enforces the contract in .github/fork-boundary.yml on every PR.
# Fails if any changed file is an upstream-owned file outside the allowlist.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, develop]

jobs:
  boundary-check:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff --name-only origin/${{ github.base_ref }}...HEAD > /tmp/changed_files.txt
          cat /tmp/changed_files.txt

      - name: Install js-yaml
        run: npm install --no-save js-yaml@^4 --legacy-peer-deps

      - name: Check boundary
        run: |
          node - <<'EOF'
          const fs   = require('fs');
          const yaml = require('js-yaml');

          const boundary = yaml.load(
            fs.readFileSync('.github/fork-boundary.yml', 'utf8')
          );
          const allowed = new Set(
            (boundary.allowed_modifications || []).map(e => e.path)
          );
          const auraDirs = boundary.aura_directories || [];

          const changed = fs.readFileSync('/tmp/changed_files.txt', 'utf8')
            .split('\n').map(s => s.trim()).filter(Boolean);

          const violations = [];

          for (const file of changed) {
            if (file.startsWith('.github/')) continue;
            if (file === 'FORK_CHANGES.md') continue;
            if (file === 'AGENTS.md') continue;  // AuraWorx-owned root doc — boundary contract for agents
            if (auraDirs.some(dir => file.startsWith(dir))) continue;
            if (allowed.has(file)) continue;
            violations.push(file);
          }

          if (violations.length > 0) {
            console.error('\nFork boundary violation — upstream files modified outside the allowlist:\n');
            violations.forEach(f => console.error(`  ${f}`));
            console.error('\nTo fix: move logic into an aura/ directory and only touch the entry-point file.');
            console.error('To expand the allowlist: add to .github/fork-boundary.yml in a separate PR with justification.');
            process.exit(1);
          }

          console.log(`Fork boundary clean — ${changed.length} files checked, 0 violations.`);
          EOF

      - name: Verify allowed modifications are minimal
        run: |
          git fetch origin ${{ github.base_ref }}
          node - <<'EOF'
          const { execSync } = require('child_process');
          const fs   = require('fs');
          const yaml = require('js-yaml');

          const boundary = yaml.load(
            fs.readFileSync('.github/fork-boundary.yml', 'utf8')
          );
          const allowed = (boundary.allowed_modifications || []).map(e => e.path);

          const violations = [];
          for (const file of allowed) {
            try {
              const diff = execSync(
                `git diff origin/${{ github.base_ref }}...HEAD -- "${file}"`,
                { encoding: 'utf8' }
              );
              const additions = (diff.match(/^\+[^+]/gm) || []).length;
              if (additions > 10) {
                violations.push({ file, additions });
              }
            } catch {}
          }
          if (violations.length > 0) {
            console.error('\nEntry-point line limit violated (limit: 10 added lines per file):\n');
            violations.forEach(v => console.error(`  ${v.file} added ${v.additions} lines`));
            console.error('\nFix: extract logic to an aura/ subdirectory and keep entry-point edits minimal.');
            console.error('Override: justify in PR description and split the change.');
            process.exit(1);
          }
          console.log('All entry-point modifications are within the 10-line limit.');
          EOF
